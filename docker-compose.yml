# Docker Compose dành cho FE devs chạy BE ở máy local.
# Chạy MongoDB + NestJS trong 1 container duy nhất.
# BE devs không cần dùng file này.
#
# Cách dùng:
#   cp .env.example .env   # điền giá trị thật, đổi PORT nếu muốn
#   docker compose up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: mangaka-app-dev
    container_name: mangaka-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      # Trỏ Prisma vào MongoDB nội bộ trong cùng container
      DATABASE_URL: mongodb://localhost:27017/Mangaka?replicaSet=rs0&directConnection=true
    ports:
      # Lấy PORT từ .env — đổi PORT trong .env nếu bị xung đột với FE dev server
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Mount toàn bộ source code (kể cả .env) vào container
      - .:/app
      # Volume riêng cho node_modules tránh bị ghi đè bởi thư mục host
      - app_node_modules:/app/node_modules
      # Cache pnpm store để install nhanh hơn
      - pnpm_store:/root/.local/share/pnpm/store
      # Persist MongoDB data
      - mongo_data:/data/db
    entrypoint: ["/bin/bash", "/app/docker-entrypoint.dev.sh"]

volumes:
  mongo_data:
  app_node_modules:
  pnpm_store:
