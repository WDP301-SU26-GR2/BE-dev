packages:
  - "."

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - "@nestjs/core"
  - unrs-resolver
  - bcrypt
  - "@scarf/scarf"
  - esbuild
  - msgpackr-extract
