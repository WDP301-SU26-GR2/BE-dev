name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build BE image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mangaka-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for compose
        run: cp .env.example .env

      - name: Bring stack up
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ >/dev/null; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API did not start"; docker compose logs --no-color; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
