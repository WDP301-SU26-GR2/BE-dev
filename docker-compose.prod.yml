services:
  redis:
    image: redis:7-alpine
    container_name: mangaka-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: ghcr.io/wdp301-su26-gr2/mangaka-api:latest
    container_name: mangaka-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
    # Không expose port ra ngoài, đi qua caddy nội bộ
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: mangaka-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

volumes:
  redis-data:
  caddy-data:
  caddy-config: