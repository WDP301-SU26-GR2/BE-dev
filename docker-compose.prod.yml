services:
  redis:
    image: redis:7-alpine
    container_name: mangaka-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: ghcr.io/wdp301-su26-gr2/mangaka-api:latest
    container_name: mangaka-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      # Bật AI: chạy compose với `--profile ai` VÀ bỏ comment 2 dòng dưới (hoặc set trong .env).
      # AI_SERVICE_URL trỏ tới service name trong mạng compose; API key khớp ai-service bên dưới.
      # AI_SERVICE_URL: http://ai-service:8000
      # AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
    # Không expose port ra ngoài, đi qua caddy nội bộ
    expose:
      - "3000"

  ai-service:
    # Image is built and published by GitHub Actions; this profile is enabled by the deploy workflow.
    # Keep AI_SERVICE_URL empty in .env when this profile is disabled.
    profiles: ["ai"]
    image: ghcr.io/wdp301-su26-gr2/mangaka-ai:latest
    container_name: mangaka-ai
    restart: unless-stopped
    # RAM cap: cách ly AI khỏi api/redis trên VPS 2GB — vượt 1.2GB RAM thì tràn swap,
    # vượt 2.5GB (RAM+swap) thì kernel giết ĐÚNG container này (job FAILED sạch, BE không sao — AC3).
    mem_limit: 1200m
    memswap_limit: 2500m
    environment:
      API_KEY: ${AI_SERVICE_API_KEY}
      # Model paths đã bake sẵn trong ai-service/Dockerfile (/srv/models/...).
      # CONF_THRESHOLD optional — bỏ trống dùng mặc định của model.
      CONF_THRESHOLD: ${AI_CONF_THRESHOLD:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/healthz').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: mangaka-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

volumes:
  redis-data:
  caddy-data:
  caddy-config:

